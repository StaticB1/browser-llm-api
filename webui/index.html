<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Browser LLM</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A4%96%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1d212b; --border:#262b36;
    --text:#e6e9ef; --muted:#8b93a7; --accent:#6ea8fe; --accent2:#9b8cfb;
    --ok:#3fb950; --busy:#d29922; --off:#484f5e; --err:#f47067;
    --radius:12px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font:15px/1.55 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:flex; flex-direction:column;
  }
  header{
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    padding:12px 18px; border-bottom:1px solid var(--border); background:var(--panel);
  }
  header h1{font-size:16px; margin:0; font-weight:650; letter-spacing:.2px}
  header h1 .dot{color:var(--accent)}
  .tabs{display:flex; gap:4px; margin-left:6px}
  .tabs button{
    background:none; border:1px solid transparent; color:var(--muted); cursor:pointer;
    padding:6px 14px; border-radius:8px; font-size:14px; font-weight:550;
  }
  .tabs button.active{background:var(--panel2); color:var(--text); border-color:var(--border)}
  .spacer{flex:1}
  select,input[type=text]{
    background:var(--panel2); color:var(--text); border:1px solid var(--border);
    border-radius:8px; padding:7px 10px; font-size:14px; outline:none;
  }
  select:focus,textarea:focus,input:focus{border-color:var(--accent)}
  .pill{
    display:inline-flex; align-items:center; gap:7px; padding:4px 11px;
    background:var(--panel2); border:1px solid var(--border); border-radius:999px;
    font-size:12.5px; color:var(--muted); white-space:nowrap;
  }
  .pill b{color:var(--text); font-weight:550}
  .dot8{width:8px;height:8px;border-radius:50%;background:var(--off);flex:none}
  .dot8.ok{background:var(--ok)} .dot8.busy{background:var(--busy);animation:pulse 1.1s infinite}
  @keyframes pulse{50%{opacity:.35}}

  main{flex:1; overflow:hidden; display:flex; justify-content:center}
  .view{display:none; width:100%; max-width:940px; padding:18px; overflow-y:auto;
        flex-direction:column; gap:14px}
  .view.active{display:flex}

  /* ---- chat ---- */
  #view-chat{padding-bottom:0}
  #chatlog{flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:12px; padding-bottom:8px}
  .msg{max-width:86%; padding:10px 14px; border-radius:var(--radius);
       border:1px solid var(--border); overflow-wrap:anywhere}
  .msg.user{align-self:flex-end; background:#20304d; border-color:#2c4066}
  .msg.assistant{align-self:flex-start; background:var(--panel)}
  .msg.error{border-color:var(--err); color:var(--err)}
  .msg .meta{font-size:11.5px; color:var(--muted); margin-bottom:4px}
  .msg pre{background:#0c0e12; border:1px solid var(--border); border-radius:8px;
           padding:10px 12px; overflow-x:auto; font-size:13px; line-height:1.45; margin:8px 0}
  .msg code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  .msg :not(pre)>code{background:#0c0e12; border:1px solid var(--border);
                      border-radius:5px; padding:1px 5px; font-size:13px}
  .msg img{max-width:100%; border-radius:8px; margin-top:6px; display:block}
  .msg a{color:var(--accent)}
  .composer{position:sticky; bottom:0; background:var(--bg); padding:10px 0 16px}
  .composer .box{display:flex; gap:10px; align-items:flex-end; background:var(--panel);
                 border:1px solid var(--border); border-radius:var(--radius); padding:10px}
  textarea{
    flex:1; background:none; border:none; color:var(--text); resize:none; outline:none;
    font:inherit; max-height:180px; min-height:24px;
  }
  .btn{
    background:var(--accent); color:#0b1020; border:none; border-radius:9px;
    padding:9px 18px; font-size:14px; font-weight:650; cursor:pointer; flex:none;
  }
  .btn:disabled{opacity:.45; cursor:default}
  .btn.ghost{background:var(--panel2); color:var(--muted); border:1px solid var(--border); font-weight:550}
  .rowline{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
  .hint{font-size:12.5px; color:var(--muted)}
  details.sys{font-size:13px; color:var(--muted)}
  details.sys textarea{width:100%; min-height:54px; background:var(--panel2);
    border:1px solid var(--border); border-radius:8px; padding:8px; margin-top:6px}

  /* ---- image ---- */
  .card{background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:16px}
  .card h2{margin:0 0 10px; font-size:15px; font-weight:650}
  #imgout{display:flex; flex-direction:column; gap:12px}
  #imgout img{max-width:100%; width:512px; border-radius:10px; border:1px solid var(--border)}
  #imgout .path{font-size:12.5px; color:var(--muted); overflow-wrap:anywhere}
  .progress{display:none; align-items:center; gap:10px; color:var(--muted); font-size:13.5px}
  .progress.on{display:flex}
  .spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);
        border-radius:50%;animation:rot .8s linear infinite;flex:none}
  @keyframes rot{to{transform:rotate(360deg)}}

  /* ---- gallery ---- */
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px}
  .grid a{display:block; position:relative; border:1px solid var(--border); border-radius:10px;
          overflow:hidden; background:var(--panel)}
  .grid img{width:100%; aspect-ratio:1; object-fit:cover; display:block}
  .grid .tag{position:absolute; left:6px; bottom:6px; font-size:10.5px; padding:2px 7px;
             border-radius:999px; background:rgba(10,12,16,.75); color:var(--text)}

  footer{
    display:flex; gap:14px; align-items:center; flex-wrap:wrap;
    padding:7px 18px; border-top:1px solid var(--border); background:var(--panel);
    font-size:12px; color:var(--muted);
  }
</style>
</head>
<body>

<header>
  <h1>Browser<span class="dot">·</span>LLM</h1>
  <nav class="tabs">
    <button data-tab="chat" class="active">Chat</button>
    <button data-tab="image">Image</button>
    <button data-tab="gallery">Gallery</button>
  </nav>
  <div class="spacer"></div>
  <label class="hint" for="provider">provider</label>
  <select id="provider"></select>
  <span id="statuspills"></span>
</header>

<main>
  <!-- ============ CHAT ============ -->
  <section class="view active" id="view-chat">
    <div id="chatlog"></div>
    <div class="composer">
      <details class="sys">
        <summary>system prompt (optional)</summary>
        <textarea id="system" placeholder="e.g. You are terse. Output only code."></textarea>
      </details>
      <div class="box">
        <textarea id="prompt" rows="1" placeholder="Message… (Enter to send, Shift+Enter for newline)"></textarea>
        <button class="btn ghost" id="newchat" title="clear the conversation">New</button>
        <button class="btn" id="send">Send</button>
      </div>
      <div class="progress" id="chatprog"><span class="spin"></span><span id="chatprogtxt"></span></div>
    </div>
  </section>

  <!-- ============ IMAGE ============ -->
  <section class="view" id="view-image">
    <div class="card">
      <h2>Generate an image</h2>
      <div class="rowline">
        <input type="text" id="imgprompt" style="flex:1"
               placeholder="e.g. isometric 3d rocket icon, vibrant, solid background">
        <button class="btn" id="imggen">Generate</button>
      </div>
      <p class="hint" style="margin:10px 0 0">
        Takes 30s–4min (free tiers are slow). ChatGPT image generation needs the server
        on a real display; Gemini works headless too. Results are saved to disk and shown
        in the <b>Gallery</b> tab.
      </p>
      <div class="progress" id="imgprog" style="margin-top:10px">
        <span class="spin"></span><span id="imgprogtxt"></span>
      </div>
    </div>
    <div id="imgout"></div>
  </section>

  <!-- ============ GALLERY ============ -->
  <section class="view" id="view-gallery">
    <div class="rowline">
      <select id="galfilter">
        <option value="">all providers</option>
        <option value="gemini">gemini</option>
        <option value="chatgpt">chatgpt</option>
      </select>
      <button class="btn ghost" id="galrefresh">Refresh</button>
      <span class="hint" id="galinfo"></span>
    </div>
    <div class="grid" id="galgrid"></div>
  </section>
</main>

<footer>
  <span id="ft-uptime">—</span>
  <span id="ft-dir"></span>
  <span class="spacer"></span>
  <span>OpenAI-compatible API at <code>/v1</code></span>
</footer>

<script>
"use strict";
const $ = s => document.querySelector(s);
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

/* ---------- tabs ---------- */
document.querySelectorAll(".tabs button").forEach(b => b.onclick = () => {
  document.querySelectorAll(".tabs button").forEach(x => x.classList.toggle("active", x===b));
  document.querySelectorAll(".view").forEach(v => v.classList.toggle("active", v.id === "view-"+b.dataset.tab));
  if (b.dataset.tab === "gallery") loadGallery();
});

/* ---------- providers + status ---------- */
async function loadModels(){
  try{
    const r = await fetch("/v1/models"); const j = await r.json();
    const sel = $("#provider"); sel.innerHTML = "";
    for (const m of j.data){
      const o = document.createElement("option"); o.value = m.id; o.textContent = m.id;
      sel.appendChild(o);
    }
    const saved = localStorage.getItem("blm.provider");
    if (saved && [...sel.options].some(o=>o.value===saved)) sel.value = saved;
  }catch(e){ console.error(e); }
}
$("#provider").addEventListener("change", e => localStorage.setItem("blm.provider", e.target.value));

function fmtUptime(s){
  if (s < 3600) return Math.floor(s/60)+"m";
  if (s < 86400) return Math.floor(s/3600)+"h "+Math.floor(s%3600/60)+"m";
  return Math.floor(s/86400)+"d "+Math.floor(s%86400/3600)+"h";
}
async function pollStatus(){
  try{
    const j = await (await fetch("/api/status")).json();
    const pills = Object.entries(j.providers).map(([name,p])=>{
      const cls = p.busy ? "busy" : (p.browser_running ? "ok" : "");
      const state = p.busy ? "busy" : (p.browser_running ? "idle" : "off");
      const short = name.replace("-browser","");
      return `<span class="pill" title="browser ${p.browser_running?"running":"not started"} · ${p.images_since_recycle}/${p.recycle_after_images} images until recycle"><span class="dot8 ${cls}"></span><b>${short}</b> ${state}</span>`;
    }).join(" ");
    $("#statuspills").innerHTML = pills;
    $("#ft-uptime").textContent = "server up "+fmtUptime(j.uptime_seconds);
    $("#ft-dir").textContent = j.image_saving ? ("images → "+j.image_dir) : "image saving disabled";
  }catch(e){
    $("#statuspills").innerHTML = `<span class="pill"><span class="dot8"></span><b>server</b> unreachable</span>`;
  }
}

/* ---------- minimal markdown (safe: escape first) ---------- */
function md(src){
  let text = esc(src);
  const blocks = [];
  text = text.replace(/```([^\n`]*)\n([\s\S]*?)```/g, (_,lang,code)=>{
    blocks.push(`<pre><code>${code}</code></pre>`); return "\u0000B" + (blocks.length-1) + "\u0000";
  });
  text = text
    .replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g, '<img src="$2" alt="$1" loading="lazy">')
    .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/`([^`\n]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*\n]+)\*\*/g, "<b>$1</b>")
    .replace(/\n/g, "<br>");
  return text.replace(/\u0000B(\d+)\u0000/g, (_,i)=>blocks[+i]);
}

/* ---------- chat ---------- */
let messages = [];   // conversation sent back to the API each turn
let chatBusy = false;

function addBubble(role, html, meta){
  const d = document.createElement("div");
  d.className = "msg "+role;
  d.innerHTML = (meta?`<div class="meta">${esc(meta)}</div>`:"") + html;
  $("#chatlog").appendChild(d);
  $("#chatlog").scrollTop = $("#chatlog").scrollHeight;
  return d;
}

async function sendChat(){
  const ta = $("#prompt");
  const text = ta.value.trim();
  if (!text || chatBusy) return;
  chatBusy = true; $("#send").disabled = true;
  ta.value = ""; ta.style.height = "auto";

  const provider = $("#provider").value;
  messages.push({role:"user", content:text});
  addBubble("user", md(text));
  const bubble = addBubble("assistant", '<span class="hint">…</span>', provider);

  const t0 = Date.now();
  $("#chatprog").classList.add("on");
  const tick = setInterval(()=>{ $("#chatprogtxt").textContent =
      `waiting for ${provider} · ${Math.floor((Date.now()-t0)/1000)}s`; }, 500);

  const payload = {model: provider, stream: true, messages: []};
  const sys = $("#system").value.trim();
  if (sys) payload.messages.push({role:"system", content:sys});
  payload.messages.push(...messages);

  let full = "";
  try{
    const res = await fetch("/v1/chat/completions", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error("HTTP "+res.status+" — "+(await res.text()).slice(0,300));
    const reader = res.body.getReader(), dec = new TextDecoder();
    let buf = "";
    for(;;){
      const {done, value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream:true});
      let i;
      while ((i = buf.indexOf("\n\n")) >= 0){
        const evt = buf.slice(0, i); buf = buf.slice(i+2);
        for (const line of evt.split("\n")){
          if (!line.startsWith("data:")) continue;
          const data = line.slice(5).trim();
          if (data === "[DONE]") continue;
          try{
            const delta = JSON.parse(data).choices[0].delta.content || "";
            if (delta){ full += delta; bubble.innerHTML =
              `<div class="meta">${esc(provider)}</div>` + md(full);
              $("#chatlog").scrollTop = $("#chatlog").scrollHeight; }
          }catch(_){}
        }
      }
    }
    if (!full) bubble.innerHTML = `<div class="meta">${esc(provider)}</div>
      <span class="hint">(empty answer — is this provider logged in? see README §Authentication)</span>`;
    messages.push({role:"assistant", content: full});
  }catch(e){
    bubble.classList.add("error");
    bubble.innerHTML = `<div class="meta">${esc(provider)}</div>`+esc(String(e));
    messages.pop();  // drop the failed user turn so a retry is clean
  }finally{
    clearInterval(tick); $("#chatprog").classList.remove("on");
    chatBusy = false; $("#send").disabled = false;
    ta.focus();
  }
}
$("#send").onclick = sendChat;
$("#prompt").addEventListener("keydown", e=>{
  if (e.key === "Enter" && !e.shiftKey){ e.preventDefault(); sendChat(); }
});
$("#prompt").addEventListener("input", e=>{
  e.target.style.height = "auto";
  e.target.style.height = Math.min(e.target.scrollHeight, 180)+"px";
});
$("#newchat").onclick = ()=>{ messages = []; $("#chatlog").innerHTML = ""; $("#prompt").focus(); };

/* ---------- image generation ---------- */
$("#imggen").onclick = async ()=>{
  const prompt = $("#imgprompt").value.trim();
  if (!prompt) return;
  const provider = $("#provider").value;
  const btn = $("#imggen"); btn.disabled = true;
  const t0 = Date.now();
  $("#imgprog").classList.add("on");
  const tick = setInterval(()=>{ $("#imgprogtxt").textContent =
      `generating with ${provider} · ${Math.floor((Date.now()-t0)/1000)}s (can take minutes)`; }, 500);
  try{
    const res = await fetch("/v1/images/generations", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({model: provider, prompt}),
    });
    const j = await res.json();
    if (!res.ok) throw new Error(j.detail || ("HTTP "+res.status));
    const out = $("#imgout");
    for (const d of j.data){
      const src = d.url || (d.b64_json ? "data:image/png;base64,"+d.b64_json : "");
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `<img src="${esc(src)}" alt="generated image">` +
        (d.path ? `<div class="path">saved: ${esc(d.path)}</div>` : "");
      out.prepend(card);
    }
  }catch(e){
    const card = document.createElement("div");
    card.className = "card"; card.style.borderColor = "var(--err)";
    card.innerHTML = `<span style="color:var(--err)">${esc(String(e))}</span>`;
    $("#imgout").prepend(card);
  }finally{
    clearInterval(tick); $("#imgprog").classList.remove("on"); btn.disabled = false;
  }
};
$("#imgprompt").addEventListener("keydown", e=>{ if (e.key==="Enter") $("#imggen").click(); });

/* ---------- gallery ---------- */
async function loadGallery(){
  try{
    const p = $("#galfilter").value;
    const j = await (await fetch("/api/gallery?limit=120"+(p?("&provider="+p):""))).json();
    $("#galinfo").textContent = j.images.length
      ? `${j.images.length} of ${j.total} images` : "no saved images yet";
    $("#galgrid").innerHTML = j.images.map(im=>{
      const when = new Date(im.mtime*1000).toLocaleString();
      return `<a href="${esc(im.url)}" target="_blank" title="${esc(im.file)} · ${when}">
        <img src="${esc(im.url)}" loading="lazy"><span class="tag">${esc(im.provider)}</span></a>`;
    }).join("");
  }catch(e){ $("#galinfo").textContent = "gallery unavailable: "+e; }
}
$("#galrefresh").onclick = loadGallery;
$("#galfilter").onchange = loadGallery;

/* ---------- boot ---------- */
loadModels();
pollStatus();
setInterval(pollStatus, 5000);
$("#prompt").focus();
</script>
</body>
</html>
